<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Arcade SENAI</title>
    <style>
        /* CSS extra só pro menu ficar bonito */
        .grid-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card-jogo {
            background-color: #1e293b;
            border: 2px solid #0ea5e9;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #e2e8f0;
            transition: 0.3s;
        }
        .card-jogo:hover {
            transform: scale(1.05);
            background-color: #0f172a;
            box-shadow: 0 0 15px #38bdf8;
        }
    </style>
</head>
<body>
    <h1>👾 Arcade do SENAI 👾</h1>
    <p>Escolha seu veneno:</p>
    <hr>

    <div class="grid-jogos">
        <a href="contador.html" class="card-jogo">
            <h2>📚 Bilu e os Livros</h2>
            <p>Contador simples de páginas.</p>
        </a>
        <a href="vendas.html" class="card-jogo">
            <h2>🧙‍♂️ Harry Ploter</h2>
            <p>Totalizador de vendas da loja.</p>
        </a>
        <a href="dados.html" class="card-jogo">
            <h2>🎲 Dados da Dona Bete</h2>
            <p>Lançador de dados RPG.</p>
        </a>
        <a href="dino.html" class="card-jogo">
            <h2>🦖 Jogo do Dino</h2>
            <p>Aposte com a Dona Bete (se tiver coragem).</p>
        </a>
        <a href="oficina.html" class="card-jogo">
            <h2>🚗 Desamassandro</h2>
            <p>Controle de caixa e repasses.</p>
        </a>
    </div>
</body>
</html>
